<html lang="de">
<head>
<meta charset="UTF-8">

<title>Variante 2 · PoK-Dashboard NRW</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap');

  :root {
    --navy: #003064; --green: #009036; --red: #E2001A; --gray: #D9D9D9;
    --teal: #175E54; --berry: #882345; --text: #1a1a2e; --muted: #6b7280; --border: #e3e3e3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Open Sans', sans-serif; background: #f5f6f8; color: var(--text); }

  header {
    background: var(--navy); color: white; padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
    position: relative; overflow: hidden;
  }
  header::after { content:''; position:absolute; top:0; right:0; width:100px; height:100px; background:var(--red); clip-path:polygon(100% 0,0 0,100% 100%); z-index:0; }
  header::before { content:''; position:absolute; bottom:0; left:0; width:80px; height:80px; background:var(--green); clip-path:polygon(0 100%,0 0,100% 100%); z-index:0; }
  header > * { position: relative; z-index: 1; }
  .htitle { font-size: 21px; font-weight: 800; }
  .hsub { font-size: 12.5px; color: #c8d4e6; margin-top: 3px; }
  .logo { font-size: 11px; font-weight: 700; letter-spacing: .04em; background: rgba(255,255,255,.12); padding: 6px 12px; border-radius: 4px; }

  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 22px 32px; }
  .kpi-card { background: white; border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border-top: 4px solid var(--navy); }
  .kpi-num { font-size: 34px; font-weight: 800; color: var(--navy); line-height: 1; }
  .kpi-label { font-size: 11.5px; color: var(--muted); margin-top: 6px; font-weight: 600; }
  .kpi-card.red { border-top-color: var(--red); } .kpi-card.red .kpi-num { color: var(--red); }
  .kpi-card.green { border-top-color: var(--green); } .kpi-card.green .kpi-num { color: var(--green); }
  .kpi-card.teal { border-top-color: var(--teal); } .kpi-card.teal .kpi-num { color: var(--teal); }

  .main { display: grid; grid-template-columns: 1fr 320px; gap: 18px; padding: 0 32px 28px; }

  .map-card { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; position: relative; height: 640px; }
  .map-toolbar { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .filter-pill { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; }
  .filter-pill.active { background: var(--navy); color: white; border-color: var(--navy); }

  #svg { width: 100%; height: calc(100% - 53px); display: block; }
  .bezirk-label { font-family: 'Open Sans', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: .08em; fill: rgba(0,48,100,.4); text-anchor: middle; pointer-events: none; }
  .hub-node polygon { filter: drop-shadow(0 2px 5px rgba(0,0,0,.25)); transition: filter .15s; cursor: pointer; }
  .hub-node:hover polygon { filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .school-node circle { filter: drop-shadow(0 1px 3px rgba(0,0,0,.25)); transition: all .15s; cursor: pointer; }
  .school-node:hover circle, .school-node.hl circle { r: 9; }
  .school-node.dim circle { opacity: .2; }
  .hub-node.dim polygon { opacity: .2; }
  .link-line { stroke-dasharray: 5 3; animation: dash 18s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -160; } }
  .link-line.dim { opacity: .1; }

  .side-panel { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); display: flex; flex-direction: column; height: 640px; overflow: hidden; }
  .sp-head { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .sp-head h3 { font-size: 13px; font-weight: 700; color: var(--navy); }
  .coop-list { flex: 1; overflow-y: auto; padding: 10px 12px; }
  .coop-item { padding: 12px; border-radius: 9px; cursor: pointer; margin-bottom: 8px; border: 1.5px solid var(--border); transition: all .15s; }
  .coop-item:hover { border-color: var(--navy); }
  .coop-item.sel { background: #eef2f8; border-color: var(--navy); }
  .ci-name { font-size: 12.5px; font-weight: 700; line-height: 1.35; color: var(--navy); }
  .ci-meta { font-size: 10.5px; color: var(--muted); margin-top: 4px; }
  .ci-status { display: inline-block; font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-top: 6px; }

  .detail-panel { grid-column: 1/-1; background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); padding: 20px 26px; margin: 0 32px 28px; }
  .detail-empty { color: var(--muted); font-style: italic; text-align: center; padding: 30px; }
  .ib-title { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 5px; }
  .ib-meta { font-size: 12.5px; color: var(--muted); margin-bottom: 10px; }
  .ib-desc { font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
  .ib-schools { display: flex; flex-wrap: wrap; gap: 7px; }
  .ib-school-tag { font-size: 11.5px; padding: 5px 11px; border-radius: 20px; background: var(--gray); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .ib-school-tag .check { color: var(--green); font-weight: 800; }
  .ib-school-tag .pend { color: var(--red); font-weight: 800; }
  .ib-tags { display:flex; gap:7px; margin-bottom:10px; flex-wrap:wrap; }
  .ib-tag { font-size: 10.5px; font-weight: 700; padding: 4px 11px; border-radius: 20px; color: white; }

  .school-tooltip {
    position: fixed; background: rgba(20,20,40,.94); color: white;
    padding: 7px 11px; border-radius: 6px; font-size: 12px; font-weight: 600;
    pointer-events: none; z-index: 999; display: none; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .school-tooltip .tt-ort { font-weight: 400; color: #c8d4e6; font-size: 11px; }
</style>
</head>

  const totalSchools = new Set(COOPS.flatMap(c => c.schools.map(s => s.name + s.ort))).size;
  const anlageA = COOPS.filter(c => c.anlage === 'A').length;
  const anlageE = COOPS.filter(c => c.anlage === 'E').length;
  const vollstaendig = COOPS.filter(c => c.status === 'vollstaendig').length;
  const bezirke = new Set(COOPS.map(c => c.bezirk)).size;

  const kpis = [
    { num: totalCoops, label: 'Kooperationen gesamt', cls: '' },
    { num: totalSchools, label: 'beteiligte Berufskollegs', cls: 'teal' },
    { num: anlageA, label: 'Anlage A (duale Ausbildung)', cls: '' },
    { num: anlageE, label: 'Anlage E (Fachschule)', cls: 'teal' },
    { num: vollstaendig, label: 'vollständig dokumentiert', cls: 'green' },
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k =>
    `<div class="kpi-card ${k.cls}"><div class="kpi-num">${k.num}</div><div class="kpi-label">${k.label}</div></div>`
  ).join('');
}

function mk(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }

document.getElementById('svg').addEventListener('mousemove', moveTip);

function visibleCoops() {
  return COOPS.filter(c => activeAnlage === 'alle' || c.anlage === activeAnlage);
}

function renderCoopList() {
  const list = document.getElementById('coop-list');
  list.innerHTML = '';
  const vis = visibleCoops();
  document.getElementById('cnt').textContent = vis.length;
  vis.forEach(c => {
    const div = document.createElement('div');
    div.className = 'coop-item' + (selectedCoop === c.id ? ' sel' : '');
    div.style.borderLeftColor = ANLAGE_COLOR[c.anlage];
    div.innerHTML = `
      <div class="ci-name">${c.name}</div>
      <div class="ci-meta">${c.bezirk} · Anlage ${c.anlage} · ${c.schools.length} Schulen</div>
      <span class="ci-status" style="background:${STATUS_COLOR[c.status]}22;color:${STATUS_COLOR[c.status]}">${c.statusLabel}</span>
    `;
    div.addEventListener('click', () => selectCoop(c.id));
    list.appendChild(div);
  });
}

function makeTriangle(cx, cy, size) {
  // Upward-pointing triangle centered on cx,cy
  const h = size * 1.1;
  const pts = [
    `${cx},${cy - h}`,
    `${cx - size},${cy + h * 0.5}`,
    `${cx + size},${cy + h * 0.5}`
  ].join(' ');
  const tri = mk('polygon');
  tri.setAttribute('points', pts);
  return tri;
}

function addHubTriangle(gHubs, cx, cy, col, coop) {
  const hg = mk('g'); hg.setAttribute('class','hub-node'); hg.dataset.coop = coop.id;
  const tri = makeTriangle(cx, cy, 9);
  tri.setAttribute('fill', col); tri.setAttribute('stroke','white'); tri.setAttribute('stroke-width','2');
  tri.setAttribute('stroke-linejoin','round');
  hg.appendChild(tri);
  hg.addEventListener('mouseenter', e => showHubTip(coop, e));
  hg.addEventListener('mousemove', moveTip);
  hg.addEventListener('mouseleave', hideTip);
  hg.addEventListener('click', () => selectCoop(coop.id));
  gHubs.appendChild(hg);
}

function renderMap() {
  const gLinks = document.getElementById('g-links');
  const gHubs  = document.getElementById('g-hubs');
  const gNodes = document.getElementById('g-nodes');
  gLinks.innerHTML = ''; gHubs.innerHTML = ''; gNodes.innerHTML = '';

  const vis = visibleCoops();

  vis.forEach(c => {
    const col = ANLAGE_COLOR[c.anlage];
    if (c.hub) {
      const hubPos = geoToSVG(c.hub.lat, c.hub.lng);
      // links from each school to hub
      c.schools.forEach(s => {
        const sp = geoToSVG(s.lat, s.lng);
        const line = mk('line');
        line.setAttribute('x1', sp.x); line.setAttribute('y1', sp.y);
        line.setAttribute('x2', hubPos.x); line.setAttribute('y2', hubPos.y);
        line.setAttribute('stroke', col); line.setAttribute('stroke-width','1.6'); line.setAttribute('stroke-opacity','.55');
        line.setAttribute('class','link-line'); line.dataset.coop = c.id;
        gLinks.appendChild(line);
      });
      // hub triangle
      addHubTriangle(gHubs, hubPos.x, hubPos.y, col, c);
    } else {
      // direct pair line
      const a = geoToSVG(c.schools[0].lat, c.schools[0].lng);
      const b = geoToSVG(c.schools[1].lat, c.schools[1].lng);
      const line = mk('line');
      line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
      line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
      line.setAttribute('stroke', col); line.setAttribute('stroke-width','1.6'); line.setAttribute('stroke-opacity','.55');
      line.setAttribute('class','link-line'); line.dataset.coop = c.id;
      gLinks.appendChild(line);
      // triangle at midpoint of the pair line
      const mx = Math.round((a.x + b.x) / 2 * 10) / 10;
      const my = Math.round((a.y + b.y) / 2 * 10) / 10;
      addHubTriangle(gHubs, mx, my, col, c);
    }

    c.schools.forEach(s => {
      const sp = geoToSVG(s.lat, s.lng);
      const g = mk('g'); g.setAttribute('class','school-node'); g.dataset.coop = c.id;
      const circle = mk('circle');
      circle.setAttribute('cx', sp.x); circle.setAttribute('cy', sp.y); circle.setAttribute('r','7');
      circle.setAttribute('fill', s.eingereicht ? '#009036' : '#E2001A');
      circle.setAttribute('stroke','white'); circle.setAttribute('stroke-width','2');
      g.appendChild(circle);
      g.addEventListener('mouseenter', e => showTip(s, c, e));
      g.addEventListener('mousemove', moveTip);
      g.addEventListener('mouseleave', hideTip);
      g.addEventListener('click', () => selectCoop(c.id));
      gNodes.appendChild(g);
    });
  });
}

function showTip(school, coop, evt) {
  const tip = document.getElementById('school-tooltip');
  tip.innerHTML = school.name + '<div class="tt-ort">' + school.ort + (school.eingereicht ? ' · PoK eingereicht' : ' · PoK ausstehend') + '</div>';
  tip.style.display = 'block';
  moveTip(evt);
}
function hideTip() {
  document.getElementById('school-tooltip').style.display = 'none';
}
function showHubTip(coop, evt) {
  const tip = document.getElementById('school-tooltip');
  tip.innerHTML = coop.hub.name + '<div class="tt-ort">Gemeinsamer Knotenpunkt · ' + coop.schools.length + ' Schulen</div>';
  tip.style.display = 'block';
  moveTip(evt);
}
function moveTip(evt) {
  const tip = document.getElementById('school-tooltip');
  if (tip.style.display !== 'block') return;
  tip.style.left = (evt.clientX + 14) + 'px';
  tip.style.top = (evt.clientY - 8) + 'px';
}

function selectCoop(id) {
  selectedCoop = id;
  const c = COOPS.find(x => x.id === id);
  document.querySelectorAll('.coop-item').forEach(el => el.classList.remove('sel'));
  renderCoopList();
  document.querySelectorAll('.link-line').forEach(l => {
    l.classList.toggle('dim', l.dataset.coop !== id);
  });
  document.querySelectorAll('.school-node, .hub-node').forEach(n => {
    n.classList.toggle('dim', n.dataset.coop !== id);
  });
  showInfo(c);
}

function showInfo(c) {
  document.getElementById('ib-empty').style.display = 'none';
  const box = document.getElementById('ib-content');
  box.style.display = 'block';
  const col = ANLAGE_COLOR[c.anlage];
  box.innerHTML = `
    <div class="ib-tags">
      <span class="ib-tag" style="background:${col}">Anlage ${c.anlage}</span>
      <span class="ib-tag" style="background:#555">${c.typ}</span>
      <span class="ib-tag" style="background:${STATUS_COLOR[c.status]}">${c.statusLabel}</span>
    </div>
    <div class="ib-title">${c.name}</div>
    <div class="ib-meta">${c.bezirk} · ${c.bildungsgang}</div>
    <div class="ib-desc">${c.beschreibung}<br><strong>Distanzumfang:</strong> ${c.distanz}</div>
    <div class="ib-schools">
      ${c.schools.map(s => `<span class="ib-school-tag"><span class="${s.eingereicht?'check':'pend'}">${s.eingereicht?'✓':'○'}</span>${s.name} (${s.ort})</span>`).join('')}
    </div>
  `;
}

function setAnlage(a, btn) {
  activeAnlage = a;
  document.querySelectorAll('.filter-pill').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  selectedCoop = null;
  document.getElementById('ib-empty').style.display = 'block';
  document.getElementById('ib-content').style.display = 'none';
  renderCoopList();
  renderMap();
}

init();
</script>
</body>
